{% extends 'base.html' %}

{% block title %}{{ title }} - Athex FinTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="glass-card">
            <h2 class="mb-4 text-primary fw-bold">{{ title }}</h2>
            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label text-muted">Title</label>
                        {{ form.title }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted">Amount</label>
                        {{ form.amount }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted">Category</label>
                        {{ form.category }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted">Date</label>
                        {{ form.date }}
                    </div>
                    <div class="col-12">
                        <label class="form-label text-muted">Description (Optional)</label>
                        {{ form.description }}
                    </div>
                </div>
                <div class="mt-4 text-end">
                    <a href="{% url 'expense_list' %}" class="btn btn-light me-2">Cancel</a>
                    <button type="submit" class="btn btn-primary-custom">Save Expense</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    /* Quick fixes for generated form fields to match our style */
    .glass-card input,
    .glass-card select,
    .glass-card textarea {
        width: 100%;
        border-radius: 8px;
        border: 1px solid #D1D5DB;
        padding: 0.5rem 1rem;
    }

    .glass-card input:focus,
    .glass-card select:focus,
    .glass-card textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        outline: none;
    }
</style>
{% endblock %}
